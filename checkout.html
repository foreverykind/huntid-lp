<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuntID — Upgrade to Pro</title>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { text-align: center; padding: 24px; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: #ff5500;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-name { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
    .hint { font-size: 13px; color: #666; }
    .err { font-size: 13px; color: #ff5500; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 128 128" fill="none" aria-hidden="true">
          <circle cx="64" cy="64" r="34" stroke="#fff" stroke-width="8"/>
          <line x1="64" y1="14" x2="64" y2="34" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
          <line x1="64" y1="94" x2="64" y2="114" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
          <line x1="14" y1="64" x2="34" y2="64" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
          <line x1="94" y1="64" x2="114" y2="64" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
          <circle cx="64" cy="64" r="8" fill="#fff"/>
        </svg>
      </div>
      <span class="logo-name">HuntID</span>
    </div>
    <p class="hint" id="hint">Opening checkout…</p>
    <p class="err" id="err" style="display:none"></p>
  </div>

  <script>
    Paddle.Environment.set("sandbox");
    Paddle.Initialize({
      token: "test_614bf3664826c37a1dda69e91e6",
      eventCallback: function (data) {
        if (data.name === "checkout.completed") {
          window.location.href = "/payment-success.html?status=success";
        }
      }
    });

    const params = new URLSearchParams(window.location.search);
    const priceId = params.get("price_id");
    const userId  = params.get("user_id");
    const email   = params.get("email");

    function showError(msg) {
      document.getElementById("hint").style.display = "none";
      const el = document.getElementById("err");
      el.style.display = "block";
      el.textContent = msg;
    }

    if (!priceId || !userId) {
      showError("Invalid checkout link. Please try again from the extension.");
    } else {
      Paddle.Checkout.open({
        items: [{ priceId: priceId, quantity: 1 }],
        customer: email ? { email: decodeURIComponent(email) } : undefined,
        customData: { user_id: userId },
        settings: {
          successUrl: "https://huntid.app/payment-success.html?status=success",
          displayMode: "overlay",
          theme: "dark",
        }
      });
    }
  </script>
</body>
</html>
